<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A5_medium</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <main>
        <section class="section1">
            <nav class="nav1">
                <div class="part1">
                    <img src="./assets/dribbble-logo.png" alt="dribbble-logo">
                    <p>Explore <i class="ri-arrow-down-s-line"></i></p>
                    <p>Hire a Designer <i class="ri-arrow-down-s-line"></i></p>
                    <p>Find Jobs </p>
                    <p>Blog </p>
                </div>
                <div class="part2">
                    <button>Sign up</button>
                    <button id="loginbtn">Log in</button>
                </div>
            </nav>
            <section class="description">
                <h1>Discover the world's <br> top designers</h1>
                <p id="exploretext">Explore work from the most talented accomplished designers<br>ready to take on your next project</p>
                <div class="searchBox">
                    <input type="text" placeholder="What are you looking for? ">
                    <div class="hoverAni">
                        <p>Shots <i class="ri-arrow-down-s-line"></i></p>
                        <span><i class="ri-search-line"></i></span>
                    </div>
                </div>
            </section>
            <div class="examples">
                <h1>Trending searches</h1>
                <button >landing page</button>
                <button >e-commerce</button>
                <button >mobile app</button>
                <button >logo design</button>
                <button >dashboard</button>
                <button >icons</button>
            </div>
        </section>
        <section class="section2">
            <nav class="nav2">
                <button><h1>Popular  <i class="ri-arrow-down-s-line"></i></h1></button>
                <div class="discover">
                    <h3>Discover</h3>
                    <h3>Animation</h3>
                    <h3>Branding</h3>
                    <h3>Illustration</h3>
                    <h3>Mobile</h3>
                    <h3>Print</h3>
                    <h3>Product Design</h3>
                    <h3>Typography</h3>
                    <h3>Web Design</h3>
                </div>
                <button id="filter"><h1><i class="ri-filter-3-line"></i> Filter</h1></button>
        </nav>
            <div class="cat1"><img src="" alt=""></div>

            <div class="cat10"><img src="" alt=""></div>
            <div class="cat11"><img src="" alt=""></div>
