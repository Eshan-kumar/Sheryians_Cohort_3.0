<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokemonCard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="outerBox">
        <div id="leftBox">
            <img id="Logo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRqEFK9HrrThFDSfdr7hfH6D15CZ9D0qFe2E2-EFvFxyQ&s" alt="pokemonLogo">

            <div id="description">
                <h4><bold>P O K E M O N G E N 1</bold></h4>
                <h1><bold>Pikachu</bold></h1>
                <p>Pikachu is an Electric-type Pokemon introduced
                    in Generation 1.Pikachu are small, chubby,
                    and incredibly cute mouse-like Pokemon.
                    They are almost completely covered by
                    yellow fur.
                </p>
                <h4><bold>---01/08</bold></h4>
            </div>

            <img id="pBall" src="https://assets.streamlinehq.com/image/private/w_300,h_300,ar_1/f_auto/v1/icons/vector-icons-7/pokeball-xeg9gc4xzwluseur3c3mm.png/pokeball-qdt0o2i0d34nyhk4opt88.png?_a=DATAiZAAZAA0" alt="pBall">
        </div>
        <div id="pikachuBox">
            <img id="pImg" src="pikachu-transparent-hd-1.png" alt="pikachu">
        </div>
        <div id="rightBox">
            <div id="menuBox">
                <img id="menuIcon" src="menu-line.png" alt="menuIcon">
            </div>
        </div>
    </div>
    
</body>
</html>
